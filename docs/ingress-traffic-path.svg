<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>OpenKubes ingress traffic path</title>
<desc>Structural diagram showing how HTTP traffic reaches a workload in a Talos guest cluster via MetalLB on RKE2, through KubeVirt virt-launcher pod, into Traefik NodePort, and to the application pod.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Client -->
<rect x="40" y="220" width="100" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="90" y="241" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Client</text>
<text x="90" y="259" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">/etc/hosts</text>

<!-- Arrow: client → MetalLB -->
<line x1="140" y1="248" x2="182" y2="248" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="161" y="241" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">:80</text>

<!-- RKE2 Host Cluster container -->
<rect x="188" y="60" width="280" height="120" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="328" y="84" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">RKE2 host cluster</text>
<text x="328" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">ok-infra + ok-gpu</text>

<!-- MetalLB box -->
<rect x="204" y="108" width="112" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="260" y="129" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">MetalLB</text>
<text x="260" y="147" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">ok-pool .200–.209</text>

<!-- ok1-talos-ingress Service -->
<rect x="336" y="108" width="120" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="396" y="129" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">ok1-talos-ingress</text>
<text x="396" y="147" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">LoadBalancer svc</text>

<!-- Arrow MetalLB → ok1-talos-ingress -->
<line x1="316" y1="136" x2="334" y2="136" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: MetalLB IP → virt-launcher (left path down) -->
<line x1="260" y1="164" x2="260" y2="220" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">192.168.100.203</text>

<!-- Arrow: ok1-talos-ingress → virt-launcher (right path down) -->
<line x1="396" y1="164" x2="396" y2="220" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="430" y="198" text-anchor="start" font-family="sans-serif" font-size="11" fill="#5F5E5A">:30080</text>

<!-- virt-launcher pod -->
<rect x="188" y="220" width="280" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="328" y="241" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">virt-launcher pod (ok-gpu)</text>
<text x="328" y="259" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">KubeVirt — host → VM eth0</text>

<!-- Arrow: virt-launcher → Guest cluster -->
<line x1="328" y1="276" x2="328" y2="316" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Guest cluster container -->
<rect x="188" y="318" width="280" height="160" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="328" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Talos guest cluster ok1-talos</text>
<text x="328" y="356" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#712B13">VM on ok-gpu · eth0 only</text>

<!-- Traefik box -->
<rect x="204" y="364" width="112" height="56" rx="8" fill="#F4C0D1" stroke="#993556" stroke-width="0.5"/>
<text x="260" y="385" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4B1528">Traefik</text>
<text x="260" y="403" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#72243E">NodePort 30080</text>

<!-- App pod -->
<rect x="356" y="364" width="100" height="56" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
<text x="406" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#173404">Open WebUI</text>
<text x="406" y="403" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#27500A">ClusterIP svc</text>

<!-- Arrow Traefik → App -->
<line x1="316" y1="392" x2="354" y2="392" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="335" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">Ingress</text>

<!-- DNS note -->
<rect x="40" y="318" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="105" y="339" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">DNS (interim)</text>
<text x="105" y="357" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">/etc/hosts · dnsmasq</text>
<line x1="170" y1="346" x2="186" y2="346" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

<!-- OK-57 future note -->
<rect x="490" y="318" width="160" height="70" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="570" y="340" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#412402">OK-57 (future)</text>
<text x="570" y="358" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#633806">Multus NAD → 2nd NIC</text>
<text x="570" y="374" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#633806">→ Cilium Gateway API</text>
<line x1="468" y1="392" x2="488" y2="358" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

<!-- Bottom contract line -->
<line x1="40" y1="490" x2="640" y2="490" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="340" y="508" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">Contract: ingressClassName: ok-ingress · hostname: &lt;app&gt;.&lt;cluster&gt;.internal · one IP from ok-pool per cluster</text>
</svg>
