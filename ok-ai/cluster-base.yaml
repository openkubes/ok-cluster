---
apiVersion: v1
kind: Namespace
metadata:
  name: ok-ai
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ok-ai
  namespace: ok-ai
  labels:
    openkubes.io/type: talos
    openkubes.io/k8s-version: v1.34.1
    openkubes.io/talos-version: v1.9.5
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
      - 10.33.0.0/16
    services:
      cidrBlocks:
      - 10.96.16.0/20
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: TalosControlPlane
    name: ok-ai-cp
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: KubevirtCluster
    name: ok-ai
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: ok-ai
  namespace: ok-ai
spec:
  controlPlaneServiceTemplate:
    spec:
      type: LoadBalancer
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha3
kind: TalosControlPlane
metadata:
  name: ok-ai-cp
  namespace: ok-ai
spec:
  version: v1.34.1
  replicas: 1
  infrastructureTemplate:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtMachineTemplate
    name: ok-ai-cp
    namespace: ok-ai
  controlPlaneConfig:
    controlplane:
      generateType: controlplane
      talosVersion: v1.9.5
      configPatches:
      - op: add
        path: /cluster/network/cni
        value:
          name: none
      - op: add
        path: /cluster/proxy
        value:
          disabled: true
      - op: add
        path: /machine/features/hostDNS
        value:
          enabled: false
---
apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfigTemplate
metadata:
  name: ok-ai-workers
  namespace: ok-ai
spec:
  template:
    spec:
      generateType: worker
      talosVersion: v1.9.5
      configPatches:
      - op: add
        path: /cluster/network/cni
        value:
          name: none
      - op: add
        path: /cluster/proxy
        value:
          disabled: true
      - op: add
        path: /machine/features/hostDNS
        value:
          enabled: false
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: ok-ai-workers
  namespace: ok-ai
spec:
  clusterName: ok-ai
  replicas: 3
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: ok-ai
  template:
    spec:
      clusterName: ok-ai
      version: v1.34.1
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: TalosConfigTemplate
          name: ok-ai-workers
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: KubevirtMachineTemplate
        name: ok-ai-workers
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: ok-ai-cp
  namespace: ok-ai
spec:
  template:
    spec:
      virtualMachineTemplate:
        metadata:
          namespace: ok-ai
        spec:
          runStrategy: Always
          template:
            spec:
              nodeSelector:
                kubernetes.io/hostname: ok-gpu
              domain:
                cpu:
                  cores: 2
                devices:
                  disks:
                  - disk:
                      bus: virtio
                    name: talos
                  networkInterfaceMultiqueue: true
                memory:
                  guest: 4Gi
              evictionStrategy: External
              volumes:
              - dataVolume:
                  name: ok-ai-cp-disk
                name: talos
          dataVolumeTemplates:
          - metadata:
              name: ok-ai-cp-disk
              namespace: ok-ai
            spec:
              pvc:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 15Gi
                storageClassName: ok-storage-block
              source:
                http:
                  url: "https://factory.talos.dev/image/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515/v1.9.5/openstack-amd64.qcow2"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: ok-ai-workers
  namespace: ok-ai
spec:
  template:
    spec:
      virtualMachineTemplate:
        metadata:
          namespace: ok-ai
        spec:
          runStrategy: Always
          template:
            spec:
              nodeSelector:
                kubernetes.io/hostname: ok-gpu
              domain:
                cpu:
                  cores: 2
                devices:
                  disks:
                  - disk:
                      bus: virtio
                    name: talos
                  networkInterfaceMultiqueue: true
                memory:
                  guest: 4Gi
              evictionStrategy: External
              volumes:
              - dataVolume:
                  name: ok-ai-worker-disk
                name: talos
          dataVolumeTemplates:
          - metadata:
              name: ok-ai-worker-disk
              namespace: ok-ai
            spec:
              pvc:
                accessModes:
                - ReadWriteOnce
                resources:
                  requests:
                    storage: 15Gi
                storageClassName: ok-storage-block
              source:
                http:
                  url: "https://factory.talos.dev/image/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515/v1.9.5/openstack-amd64.qcow2"
