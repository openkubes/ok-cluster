# OpenClaw Claim for ok-ai — real provider values (this repo is their home,
# ok-cluster is permanently private). Submit to ok-mgmt:
#   kubectl --kubeconfig ~/.kube/ok-mgmt.yaml apply -f claim-ok-ai.yaml
# Prereqs (once): make token-secret + make setup in
#   openkubes/platform/ai/openclaw/crossplane/
apiVersion: platform.openkubes.ai/v1alpha1
kind: OpenClawClaim
metadata:
  name: ok-ai
  namespace: openkubes-system
spec:
  clusterRef: ok-ai
  ollamaEndpoint: http://192.168.100.202:11434
  namespace: openclaw
  model: gpt-oss:20b
  numCtx: 65536
