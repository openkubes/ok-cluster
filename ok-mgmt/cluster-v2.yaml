---
# templates/talos/cluster-v2.yaml.tpl
# CAPK v2 format with ConfigDrive — rendered by render.py
# Extends cluster-base.yaml with explicit ConfigDrive source for openstack-amd64.qcow2
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeVirtMachineTemplate
metadata:
  name: ok-mgmt-cp-v2
  namespace: default
  annotations:
    openkubes.io/talos-schematic: ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515
spec:
  template:
    spec:
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          template:
            spec:
              domain:
                cpu:
                  cores: 2
                resources:
                  requests:
                    memory: 4Gi
              volumes:
                - name: bootvolume
                  dataVolume:
                    name: ok-mgmt-cp-v2-boot
                - name: cloudinitdisk
                  cloudInitConfigDrive: {}
              dataVolumeTemplates:
                - metadata:
                    name: ok-mgmt-cp-v2-boot
                  spec:
                    pvc:
                      accessModes: [ReadWriteOnce]
                      resources:
                        requests:
                          storage: 20Gi
                      storageClassName: local-path
                    source:
                      registry:
                        url: "docker://factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515:v1.9.5"
                        secretRef:
                          name: talos-registry-pull-secret
